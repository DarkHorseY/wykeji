<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在建设中</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #1e293b 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* 背景动画装饰 */
    .bg-decoration {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .floating-icon {
      position: absolute;
      color: rgba(148, 163, 184, 0.15);
      animation: float 6s ease-in-out infinite;
    }

    .floating-icon:nth-child(1) {
      top: 15%;
      left: 10%;
      font-size: 3rem;
      animation-delay: 0s;
    }

    .floating-icon:nth-child(2) {
      top: 20%;
      right: 10%;
      font-size: 2.5rem;
      animation-delay: 1s;
    }

    .floating-icon:nth-child(3) {
      bottom: 20%;
      right: 15%;
      font-size: 3.5rem;
      animation-delay: 2s;
    }

    .floating-icon:nth-child(4) {
      bottom: 25%;
      left: 8%;
      font-size: 2rem;
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
      }
    }

    /* 主卡片 */
    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                  0 0 0 1px rgba(255, 255, 255, 0.1);
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 图标区域 */
    .icon-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .icon-box {
      position: relative;
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px -10px rgba(251, 191, 36, 0.5);
      animation: wiggle 2s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }

    .icon-box i {
      font-size: 3rem;
      color: white;
    }

    .notification-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 28px;
      height: 28px;
      background: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .notification-badge i {
      font-size: 0.75rem;
      color: white;
    }

    /* 标题和描述 */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 16px;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .description {
      color: #94a3b8;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.3s both;
    }

    /* 进度条 */
    .progress-section {
      margin-bottom: 32px;
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #94a3b8;
      font-size: 0.875rem;
    }

    .progress-value {
      color: #fbbf24;
      font-weight: 600;
      font-size: 0.875rem;
    }

    .progress-bar {
      height: 10px;
      background: rgba(30, 41, 59, 0.8);
      border-radius: 9999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
      border-radius: 9999px;
      width: 0%;
      transition: width 0.5s ease-out;
      box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
    }

    /* 订阅表单 */
    .subscribe-section {
      animation: fadeInUp 0.6s ease-out 0.5s both;
    }

    .subscribe-label {
      color: #94a3b8;
      font-size: 0.875rem;
      text-align: center;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      gap: 12px;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 1rem;
    }

    input[type="email"] {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(100, 116, 139, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: #fbbf24;
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
    }

    input[type="email"]::placeholder {
      color: #64748b;
    }

    input[type="email"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .submit-btn {
      padding: 14px 24px;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(251, 191, 36, 0.4);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .submit-btn.success {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    }

    /* 底部信息 */
    .footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      animation: fadeInUp 0.6s ease-out 0.6s both;
    }

    .footer p {
      color: #64748b;
      font-size: 0.875rem;
    }

    .footer a {
      color: #fbbf24;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer a:hover {
      color: #f59e0b;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .card {
        padding: 32px 24px;
      }

      h1 {
        font-size: 1.5rem;
      }

      .icon-box {
        width: 80px;
        height: 80px;
      }

      .icon-box i {
        font-size: 2.5rem;
      }

      .form-group {
        flex-direction: column;
      }

      .submit-btn {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="bg-decoration">
    <i class="fas fa-cog floating-icon"></i>
    <i class="fas fa-hammer floating-icon"></i>
    <i class="fas fa-wrench floating-icon"></i>
    <i class="fas fa-cog floating-icon"></i>
  </div>

  <!-- 主卡片 -->
  <div class="card">
    <!-- 图标 -->
    <div class="icon-wrapper">
      <div class="icon-box">
        <i class="fas fa-hard-hat"></i>
        <div class="notification-badge">
          <i class="fas fa-exclamation"></i>
        </div>
      </div>
    </div>

    <!-- 标题 -->
    <h1>正在建设中</h1>

    <!-- 描述 -->
    <p class="description">
      我们正在努力为您打造更好的体验<br>
      敬请期待，精彩即将呈现
    </p>

  </div>

  <script>
    // 进度条动画
    let progress = 0;
    const targetProgress = 75;
    const progressFill = document.getElementById('progressFill');
    const progressValue = document.getElementById('progressValue');

    function updateProgress() {
      if (progress < targetProgress) {
        progress++;
        progressFill.style.width = progress + '%';
        progressValue.textContent = progress + '%';
        setTimeout(updateProgress, 30);
      }
    }

    // 页面加载后开始动画
    setTimeout(updateProgress, 500);

    // 表单提交处理
    const form = document.getElementById('subscribeForm');
    const emailInput = document.getElementById('emailInput');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      if (email) {
        // 禁用输入和按钮
        emailInput.disabled = true;
        submitBtn.disabled = true;
        
        // 更改按钮状态
        submitBtn.classList.add('success');
        submitBtn.innerHTML = '<i class="fas fa-check"></i><span>已订阅</span>';
        
        // 3秒后重置
        setTimeout(function() {
          emailInput.disabled = false;
          submitBtn.disabled = false;
          submitBtn.classList.remove('success');
          submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i><span>订阅</span>';
          emailInput.value = '';
        }, 3000);
      }
    });
  </script>
</body>
</html>
